<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="description" content="CCmall经营三部AI任务管理系统 — 支持品牌管理、合同条款AI学习、飞书通知">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>经营三部 · 任务中心</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><rect width='120' height='120' rx='28' fill='%23161b2e'/><text x='60' y='72' text-anchor='middle' fill='%23f0b90b' font-size='52' font-family='sans-serif'>📋</text></svg>">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="notify-prompt hidden" id="notifyPrompt">🔔 开启通知，到期任务自动提醒 <button id="notifyEnable">开启</button></div>

<header class="header">
  <div class="header-top">
    <div><h1>经营三部 · 任务中心</h1><div class="date" id="headerDate"></div></div>
    <div class="header-actions">
      <button id="btnExport" title="导出数据">📤</button>
      <button id="btnSettings" title="设置">⚙️</button>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card pending"><div class="num" id="statPending">0</div><div class="label">待处理</div></div>
    <div class="stat-card today"><div class="num" id="statToday">0</div><div class="label">今日新增</div></div>
    <div class="stat-card done"><div class="num" id="statDone">0</div><div class="label">已完成</div></div>
    <div class="stat-card overdue"><div class="num" id="statOverdue">0</div><div class="label">已逾期</div></div>
  </div>
</header>

<div class="search-bar" id="searchBar">
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="搜索任务内容、品牌、类型...">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="pending">待处理 <span class="count">0</span></button>
  <button class="tab" data-tab="all">全部 <span class="count">0</span></button>
  <button class="tab" data-tab="done">已完成 <span class="count">0</span></button>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-chip active" data-filter="all">全部品牌</button>
</div>

<div class="task-list" id="taskList"></div>
<div class="brand-list" id="brandListContainer" style="display:none"></div>
<div class="clause-list" id="contractListContainer" style="display:none"></div>

<div id="chatContainer" style="display:none;padding:12px 16px">
  <div class="chat-container">
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg ai">👋 你好！我已经学习了所有合同条款，可以直接问我关于合同的问题。例如："耐克的违约金条款是什么？"</div>
    </div>
  </div>
  <div class="chat-input-row">
    <input type="text" id="chatInput" placeholder="输入合同相关问题...">
    <button id="chatSendBtn">发送</button>
  </div>
</div>

<div class="empty-state" id="emptyState" style="display:none">
  <div class="empty-icon">📋</div>
  <div class="empty-title" id="emptyTitle">暂无任务</div>
  <div class="empty-desc">点右下角 + 按钮，粘贴微信/飞书消息，AI 自动提取。<br>支持一条消息含多个任务，自动拆分。</div>
</div>

<nav class="nav-tabs">
  <button class="nav-tab active" data-view="tasks"><span class="nav-icon">📋</span>任务<span class="nav-badge" id="navPendingBadge" style="display:none">0</span></button>
  <button class="nav-tab" data-view="brands"><span class="nav-icon">🏢</span>品牌</button>
  <button class="nav-tab" data-view="contracts"><span class="nav-icon">📜</span>合同</button>
  <button class="nav-tab" data-view="chat"><span class="nav-icon">🤖</span>AI问答</button>
</nav>

<div class="fab-row" id="fab-row">
  <button class="fab" id="fab">+</button>
</div>

<!-- Task Add Modal -->
<div class="modal-overlay" id="modalOverlay"><div class="modal-sheet">
  <h2>添加任务</h2>
  <textarea id="taskInput" placeholder="粘贴微信/飞书消息内容...&#10;&#10;支持多条任务一起粘贴，AI 自动拆分&#10;例如：今天给妈妈买菜 下午2点写报告 耐克修改合同"></textarea>
  <div style="font-size:12px;color:var(--sub);margin:6px 0 0">💡 支持时间识别：明天12点前、下午3点、下周一……</div>
  <div class="modal-actions"><button class="btn-cancel" id="btnCancel">取消</button><button class="btn-submit" id="btnSubmit">🤖 AI 提取</button></div>
</div></div>

<!-- Brand Add Modal -->
<div class="modal-overlay" id="brandModal"><div class="modal-sheet">
  <h2>🏢 添加品牌</h2>
  <div style="margin-bottom:12px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">品牌名称 *</label><input type="text" id="brandNameInput" placeholder="例如：Nike"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">楼层</label><input type="text" id="brandFloorInput" placeholder="例如：1F"></div>
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">品类</label><input type="text" id="brandCategoryInput" placeholder="例如：运动"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">面积 (㎡)</label><input type="text" id="brandAreaInput" placeholder="例如：200" inputmode="numeric"></div>
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">月租金 (¥)</label><input type="text" id="brandRentInput" placeholder="例如：50000" inputmode="numeric"></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">租约开始</label><input type="date" id="brandLeaseStartInput"></div>
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">租约到期</label><input type="date" id="brandLeaseEndInput"></div>
  </div>
  <div style="margin-bottom:12px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">备注</label><input type="text" id="brandNotesInput" placeholder="其他备注信息"></div>
  <div class="modal-actions"><button class="btn-cancel" id="brandModalCancel">取消</button><button class="btn-submit" id="brandModalSave">保存</button></div>
</div></div>

<!-- Contract Clause Add Modal -->
<div class="modal-overlay" id="contractModal"><div class="modal-sheet">
  <h2>📜 添加合同条款</h2>
  <div style="margin-bottom:12px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">条款标题 *</label><input type="text" id="contractTitleInput" placeholder="例如：违约金条款"></div>
  <div style="margin-bottom:12px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">条款内容 *</label><textarea id="contractContentInput" placeholder="粘贴合同条款原文...&#10;&#10;例如：如乙方提前撤场，需支付相当于3个月租金的违约金..."></textarea></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">所属品牌</label><input type="text" id="contractBrandInput" placeholder="例如：Nike"></div>
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">条款分类</label><select id="contractCategoryInput"><option value="租金">租金</option><option value="违约金">违约金</option><option value="续约">续约</option><option value="撤场">撤场</option><option value="装修">装修</option><option value="分成">分成</option><option value="其他">其他</option></select></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">标签（逗号分隔）</label><input type="text" id="contractTagsInput" placeholder="例如：提前解约,赔偿"></div>
    <div><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">来源文件</label><input type="text" id="contractSourceInput" placeholder="例如：Nike租赁合同2025.pdf"></div>
  </div>
  <div class="modal-actions"><button class="btn-cancel" id="contractModalCancel">取消</button><button class="btn-submit" id="contractModalSave">保存</button></div>
</div></div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsOverlay"><div class="modal-sheet">
  <h2>⚙️ 设置</h2>
  <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">DeepSeek API Key</label><input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx"><div style="font-size:11px;color:var(--sub);margin-top:4px"><a href="https://platform.deepseek.com" target="_blank" style="color:var(--info)">platform.deepseek.com</a> · 充10元用一年</div></div>
  <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">📡 飞书机器人 Webhook（可选）</label><input type="text" id="feishuWebhookInput" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxxx"><div style="font-size:11px;color:var(--sub);margin-top:4px">飞书群 → 设置 → 群机器人 → 添加 → Webhook 地址</div></div>
  <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:6px">⏰ 到期提醒</label><select id="remindSetting"><option value="off">关闭提醒</option><option value="15">每 15 分钟检查</option><option value="30" selected>每 30 分钟检查</option><option value="60">每 1 小时检查</option></select></div>
  <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">🎨 外观</label><button id="themeToggleBtn" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;font-family:var(--font-stack)">🌙 暗色模式</button></div>
  <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">数据管理</label><button id="btnImport" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;font-family:var(--font-stack)">📥 导入备份文件</button><input type="file" id="importFile" accept=".json" style="display:none"></div>
  <div class="modal-actions"><button class="btn-cancel" id="btnSettingsCancel">关闭</button><button class="btn-submit" id="btnSettingsSave">保存</button></div>
</div></div>

<div class="modal-overlay" id="detailOverlay"><div class="modal-sheet" id="detailSheet"></div></div>
<div class="processing-overlay" id="processingOverlay"><div class="spinner"></div><div class="text">AI 正在分析...</div></div>
<div class="toast" id="toast"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
