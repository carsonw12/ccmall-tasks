<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f1a">
<title>经营三部 · 任务中心</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><rect width='120' height='120' rx='28' fill='%23161b2e'/><text x='60' y='72' text-anchor='middle' fill='%23f0b90b' font-size='52' font-family='sans-serif'>📋</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f2f2f7;--card:#ffffff;--text:#1c1c1e;--sub:#8e8e93;--header-bg:#0f0f1a;--accent:#f0b90b;--danger:#ff3b30;--success:#34c759;--warning:#ff9500;--info:#007aff;--brand-chip-bg:#f0f0f5;--border:#e5e5ea;--shadow-sm:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);--radius-sm:8px;--radius-md:14px;--radius-lg:20px;--font-stack:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Helvetica Neue",sans-serif}
body{font-family:var(--font-stack);background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;-webkit-font-smoothing:antialiased;overflow-x:hidden;padding-bottom:100px;user-select:none;-webkit-user-select:none}

.notify-prompt{background:var(--accent);color:#000;padding:10px 16px;font-size:13px;font-weight:600;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:transform .2s,opacity .3s}
.notify-prompt:active{transform:scale(.98)}.notify-prompt.hidden{display:none}
.notify-prompt button{background:#000;color:var(--accent);border:none;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-stack)}

.header{background:var(--header-bg);color:#fff;padding:env(safe-area-inset-top,0) 20px 16px;position:sticky;top:0;z-index:100}
.header-top{display:flex;align-items:center;justify-content:space-between;padding-top:12px}
.header h1{font-size:20px;font-weight:700;letter-spacing:-.2px}
.header .date{font-size:13px;color:rgba(255,255,255,.55);margin-top:2px}
.header-actions{display:flex;gap:8px}
.header-actions button{background:none;border:none;font-size:20px;cursor:pointer;color:#fff;opacity:.7;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:opacity .15s}
.header-actions button:active{opacity:1}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-top:16px}
.stat-card{background:rgba(255,255,255,.08);border-radius:var(--radius-sm);padding:10px 8px;text-align:center;backdrop-filter:blur(10px)}
.stat-card .num{font-size:22px;font-weight:800;letter-spacing:-1px}
.stat-card .label{font-size:10px;color:rgba(255,255,255,.5);margin-top:2px}
.stat-card.pending .num{color:var(--warning)}.stat-card.today .num{color:var(--accent)}.stat-card.done .num{color:var(--success)}.stat-card.overdue .num{color:var(--danger)}

.search-bar{padding:8px 20px;background:var(--bg);position:sticky;top:155px;z-index:98}
.search-input{width:100%;padding:10px 14px 10px 36px;border:none;border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-size:15px;font-family:var(--font-stack);box-shadow:var(--shadow-sm)}
.search-input::placeholder{color:var(--sub)}.search-input:focus{outline:none;box-shadow:var(--shadow-md)}
.search-wrapper{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--sub);pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:16px;color:var(--sub);cursor:pointer;display:none;padding:4px}
.search-clear.visible{display:block}

.tabs{display:flex;gap:0;padding:0 20px;background:var(--bg);position:sticky;top:205px;z-index:97;border-bottom:1px solid var(--border)}
.tab{padding:12px 18px;font-size:14px;font-weight:600;color:var(--sub);border:none;background:none;cursor:pointer;position:relative;transition:color .2s;font-family:var(--font-stack)}
.tab.active{color:var(--text)}.tab.active::after{content:'';position:absolute;bottom:-1px;left:12px;right:12px;height:2.5px;background:var(--accent);border-radius:2px}
.tab .count{display:inline-block;background:var(--border);color:var(--sub);font-size:11px;font-weight:600;padding:1px 7px;border-radius:10px;margin-left:4px}

.filter-bar{display:flex;gap:8px;padding:10px 20px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:7px 14px;border-radius:16px;border:1.5px solid var(--border);font-size:13px;font-weight:600;white-space:nowrap;background:var(--card);color:var(--sub);cursor:pointer;transition:all .2s;font-family:var(--font-stack)}
.filter-chip.active{background:var(--text);color:#fff;border-color:var(--text)}

.task-list{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.swipe-wrap{position:relative;overflow:hidden;border-radius:var(--radius-md)}
.swipe-bg{position:absolute;inset:0;display:flex;align-items:stretch;border-radius:var(--radius-md);overflow:hidden}
.swipe-bg .left-action,.swipe-bg .right-action{display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;min-width:80px;transition:opacity .15s}
.swipe-bg .left-action{background:var(--success);opacity:0}
.swipe-bg .right-action{background:var(--danger);margin-left:auto;opacity:0}

.task-card{background:var(--card);border-radius:var(--radius-md);padding:14px 16px;box-shadow:var(--shadow-sm);display:flex;align-items:flex-start;gap:12px;transition:transform .2s cubic-bezier(.25,.8,.25,1.2),opacity .3s;cursor:pointer;position:relative;z-index:1;-webkit-tap-highlight-color:transparent;touch-action:pan-y}
.task-card.done{opacity:.45}
.task-card.overdue{border-left:3px solid var(--danger);background:linear-gradient(135deg,var(--card) 0%,rgba(255,59,48,.03) 100%)}

.priority-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px}
.priority-dot.high{background:var(--danger);box-shadow:0 0 6px rgba(255,59,48,.4)}
.priority-dot.medium{background:var(--warning);box-shadow:0 0 6px rgba(255,149,0,.3)}
.priority-dot.low{background:var(--success);box-shadow:0 0 6px rgba(52,199,89,.3)}
.card-body{flex:1;min-width:0}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.brand-chip{font-size:11px;font-weight:700;color:var(--info);background:rgba(0,122,255,.08);padding:2px 8px;border-radius:4px;white-space:nowrap}
.type-chip{font-size:10px;font-weight:600;color:var(--sub);background:var(--brand-chip-bg);padding:2px 8px;border-radius:4px;white-space:nowrap}
.source-chip{font-size:10px;color:var(--warning);background:rgba(255,149,0,.08);padding:2px 8px;border-radius:4px;white-space:nowrap}
.card-content{font-size:15px;font-weight:500;line-height:1.4;color:var(--text);word-break:break-word}
.card-content.done-text{text-decoration:line-through;color:var(--sub)}
.card-footer{display:flex;align-items:center;gap:10px;margin-top:8px}
.deadline{font-size:12px;color:var(--danger);display:flex;align-items:center;gap:3px}
.deadline.soon{font-weight:700}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.time-ago{font-size:11px;color:var(--sub)}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.7}
.empty-title{font-size:18px;font-weight:700;margin-bottom:6px}
.empty-desc{font-size:14px;color:var(--sub);line-height:1.5;max-width:280px}

.fab-row{position:fixed;bottom:30px;right:20px;display:flex;flex-direction:column;gap:12px;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.fab{width:52px;height:52px;border-radius:50%;background:var(--accent);color:#000;border:none;font-size:24px;font-weight:700;box-shadow:0 4px 16px rgba(240,185,11,.4);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;-webkit-tap-highlight-color:transparent}
.fab:active{transform:scale(.9)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{background:var(--card);border-radius:var(--radius-lg) var(--radius-lg) 0 0;width:100%;max-width:500px;padding:20px 20px 30px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);max-height:85vh;overflow-y:auto}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-sheet h2{font-size:18px;font-weight:700;margin-bottom:16px}
.modal-sheet textarea,.modal-sheet input[type=text],.modal-sheet input[type=password],.modal-sheet select{width:100%;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-size:15px;font-family:var(--font-stack);background:var(--bg);color:var(--text)}
.modal-sheet textarea{height:100px;resize:none}
.modal-sheet textarea:focus,.modal-sheet input:focus,.modal-sheet select:focus{outline:none;border-color:var(--accent)}
.modal-actions{display:flex;gap:10px;margin-top:14px}
.modal-actions button{flex:1;padding:12px;border-radius:var(--radius-sm);border:none;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font-stack)}
.btn-cancel{background:var(--brand-chip-bg);color:var(--text)}
.btn-submit{background:var(--accent);color:#000}
.btn-ios{background:var(--info);color:#fff}

.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:10px 16px;border-radius:20px;font-size:14px;font-weight:600;z-index:400;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;display:flex;align-items:center;gap:10px;white-space:nowrap}
.toast.show{opacity:1;pointer-events:auto}
.toast .undo-btn{background:var(--accent);color:#000;border:none;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-stack)}

.processing-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:350;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.processing-overlay.show{opacity:1;pointer-events:auto}
.spinner{width:24px;height:24px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.processing-overlay .text{color:#fff;font-size:15px;font-weight:500;margin-top:14px}

@media(min-width:500px){.task-list{padding:12px 24px}.stats-row{gap:12px}.fab-row{right:calc(50% - 230px)}}
</style>
</head>
<body>
<div class="notify-prompt hidden" id="notifyPrompt">🔔 开启通知，到期任务自动提醒 <button id="notifyEnable">开启</button></div>

<header class="header">
  <div class="header-top"><div><h1>经营三部 · 任务中心</h1><div class="date" id="headerDate"></div></div>
  <div class="header-actions"><button id="btnExport" title="导出数据">📤</button><button id="btnSettings" title="设置">⚙️</button></div></div>
  <div class="stats-row">
    <div class="stat-card pending"><div class="num" id="statPending">0</div><div class="label">待处理</div></div>
    <div class="stat-card today"><div class="num" id="statToday">0</div><div class="label">今日新增</div></div>
    <div class="stat-card done"><div class="num" id="statDone">0</div><div class="label">已完成</div></div>
    <div class="stat-card overdue"><div class="num" id="statOverdue">0</div><div class="label">已逾期</div></div>
  </div>
</header>

<div class="search-bar"><div class="search-wrapper"><span class="search-icon">🔍</span><input type="text" class="search-input" id="searchInput" placeholder="搜索任务内容、品牌、类型..."><button class="search-clear" id="searchClear">✕</button></div></div>

<div class="tabs" id="tabs">
  <button class="tab active" data-tab="pending">待处理 <span class="count">0</span></button>
  <button class="tab" data-tab="all">全部 <span class="count">0</span></button>
  <button class="tab" data-tab="done">已完成 <span class="count">0</span></button>
</div>

<div class="filter-bar" id="filterBar"><button class="filter-chip active" data-filter="all">全部品牌</button></div>
<div class="task-list" id="taskList"></div>

<div class="empty-state" id="emptyState" style="display:none"><div class="empty-icon">📋</div><div class="empty-title" id="emptyTitle">暂无任务</div><div class="empty-desc">点右下角 + 按钮，粘贴微信/飞书消息，AI 自动提取。<br>支持一条消息含多个任务，自动拆分。</div></div>

<div class="fab-row"><button class="fab" id="fab">+</button></div>

<div class="modal-overlay" id="modalOverlay"><div class="modal-sheet">
  <h2>添加任务</h2>
  <textarea id="taskInput" placeholder="粘贴微信/飞书消息内容...&#10;&#10;支持多条任务一起粘贴，AI 自动拆分&#10;例如：今天给妈妈买菜 下午2点写报告 耐克修改合同"></textarea>
  <div style="font-size:12px;color:var(--sub);margin:6px 0 0">💡 支持时间识别：明天12点前、下午3点、下周一……</div>
  <div class="modal-actions"><button class="btn-cancel" id="btnCancel">取消</button><button class="btn-submit" id="btnSubmit">🤖 AI 提取</button></div>
</div></div>

<div class="processing-overlay" id="processingOverlay"><div class="spinner"></div><div class="text">AI 正在分析任务...</div></div>

<div class="modal-overlay" id="settingsOverlay"><div class="modal-sheet">
  <h2>⚙️ 设置</h2>
  <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">DeepSeek API Key</label>
  <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font-stack);background:var(--bg)">
  <div style="font-size:11px;color:var(--sub);margin-top:4px"><a href="https://platform.deepseek.com" target="_blank" style="color:var(--info)">platform.deepseek.com</a> · 充10元用一年</div></div>

  <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">📡 飞书机器人 Webhook（可选）</label>
  <input type="text" id="feishuWebhookInput" placeholder="https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxxxxx" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font-stack);background:var(--bg)">
  <div style="font-size:11px;color:var(--sub);margin-top:4px">飞书群 → 设置 → 群机器人 → 添加 → Webhook 地址</div></div>

  <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:6px">⏰ 到期提醒</label>
  <select id="remindSetting" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:var(--font-stack);background:var(--bg)">
    <option value="off">关闭提醒</option><option value="15">每 15 分钟检查</option><option value="30" selected>每 30 分钟检查</option><option value="60">每 1 小时检查</option></select>
  <div style="font-size:11px;color:var(--sub);margin-top:4px">到期后弹出通知 + 飞书消息，未完成则重复提醒</div></div>

  <div style="margin-bottom:16px"><label style="font-size:13px;font-weight:600;color:var(--sub);display:block;margin-bottom:4px">数据管理</label>
  <button id="btnImport" style="width:100%;padding:10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--card);color:var(--text);font-size:14px;cursor:pointer;font-family:var(--font-stack)">📥 导入备份文件</button>
  <input type="file" id="importFile" accept=".json" style="display:none"></div>

  <div class="modal-actions"><button class="btn-cancel" id="btnSettingsCancel">关闭</button><button class="btn-submit" id="btnSettingsSave">保存</button></div>
</div></div>

<div class="modal-overlay" id="detailOverlay"><div class="modal-sheet" id="detailSheet"></div></div>
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
//  经营三部 · 任务中心  v4
//  多任务拆分 · 时间提醒 · 飞书+iOS通知
// ═══════════════════════════════════════════
const DB_NAME='ccmall_tasks_db',DB_VERSION=1,STORE='tasks',API_KEY_STORAGE='deepseek_api_key',DEEPSEEK_API='https://api.deepseek.com/v1/chat/completions',REMIND_SETTING_KEY='remind_interval',FEISHU_WEBHOOK_KEY='feishu_webhook_url';
let db=null,tasks=[],currentTab='pending',currentFilter='all',searchQuery='',apiKey='',feishuWebhookUrl='',remindInterval=30,reminderTimer=null,notificationsEnabled=false;

// ─── IndexedDB ────────────────────────────────
function openDB(){return new Promise((r,j)=>{const req=indexedDB.open(DB_NAME,DB_VERSION);req.onupgradeneeded=e=>{const d=e.target.result;if(!d.objectStoreNames.contains(STORE))d.createObjectStore(STORE,{keyPath:'id'})};req.onsuccess=e=>{db=e.target.result;r(db)};req.onerror=e=>j(e.target.error)})}
function dbGetAll(){return new Promise((r,j)=>{const tx=db.transaction(STORE,'readonly'),req=tx.objectStore(STORE).getAll();req.onsuccess=()=>r(req.result);req.onerror=()=>j(req.error)})}
function dbPut(task){return new Promise((r,j)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).put(task);tx.oncomplete=()=>r();tx.onerror=()=>j(tx.error)})}
function dbDelete(id){return new Promise((r,j)=>{const tx=db.transaction(STORE,'readwrite');tx.objectStore(STORE).delete(id);tx.oncomplete=()=>r();tx.onerror=()=>j(tx.error)})}
async function dbPutAll(tl){const tx=db.transaction(STORE,'readwrite'),store=tx.objectStore(STORE);for(const t of tl)store.put(t);return new Promise((r,j)=>{tx.oncomplete=r;tx.onerror=()=>j(tx.error)})}
async function migrateFromLocalStorage(){const old=localStorage.getItem('ccmall_tasks_v2');if(!old)return;try{const tl=JSON.parse(old);if(tl.length>0){await dbPutAll(tl)}localStorage.removeItem('ccmall_tasks_v2')}catch(_){}}
async function loadTasks(){tasks=await dbGetAll()}
async function saveTask(t){await dbPut(t)}
function loadApiKey(){apiKey=localStorage.getItem(API_KEY_STORAGE)||''}
function loadRemindSetting(){const v=localStorage.getItem(REMIND_SETTING_KEY);remindInterval=v?parseInt(v):30}
function loadFeishuWebhook(){feishuWebhookUrl=localStorage.getItem(FEISHU_WEBHOOK_KEY)||''}

// ─── Helpers ───────────────────────────────────
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function todayStr(){return new Date().toISOString().slice(0,10)}
function timeAgo(iso){const diff=Date.now()-new Date(iso).getTime();const mins=Math.floor(diff/60000);if(mins<1)return'刚刚';if(mins<60)return mins+'分钟前';const hrs=Math.floor(mins/60);if(hrs<24)return hrs+'小时前';return Math.floor(hrs/24)+'天前'}
function isToday(iso){return iso&&iso.slice(0,10)===todayStr()}
function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function parseLocalDeadline(text){
  const now=new Date();const m=text.match(/(今天|明天|后天|周[一二三四五六日]|下周[一二三四五六日]|(\d+)号前|(\d+)月(\d+)号|(\d+)点|(\d+):(\d+)|上午|下午|中午)/g);if(!m)return null;
  let d=new Date(now);d.setHours(18,0,0,0);let matchedDay=false;
  if(text.includes('明天')){d.setDate(d.getDate()+1);matchedDay=true}else if(text.includes('后天')){d.setDate(d.getDate()+2);matchedDay=true}else if(text.includes('今天')){matchedDay=true}else{const wm=text.match(/下周([一二三四五六日])/);if(wm){const map={一:1,二:2,三:3,四:4,五:5,六:6,日:7};const cur=d.getDay()||7;d.setDate(d.getDate()+map[wm[1]]-cur+7);matchedDay=true}else{const tw=text.match(/周([一二三四五六日])/);if(tw){const map={一:1,二:2,三:3,四:4,五:5,六:6,日:7};const cur=d.getDay()||7;const diff=map[tw[1]]-cur;d.setDate(d.getDate()+(diff<=0?diff+7:diff));matchedDay=true}}}
  const md=text.match(/(\d+)月(\d+)号/);if(md){d.setMonth(parseInt(md[1])-1);d.setDate(parseInt(md[2]));matchedDay=true}else{const dm=text.match(/(\d+)号前/);if(dm){const target=parseInt(dm[1]);if(target<now.getDate())d.setMonth(d.getMonth()+1);d.setDate(target);matchedDay=true}}
  const t24=text.match(/(\d+):(\d+)/);if(t24){d.setHours(parseInt(t24[1]),parseInt(t24[2]),0,0)}else{const hm=text.match(/(\d+)点/);if(hm){let h=parseInt(hm[1]);if(text.includes('下午')&&h<12)h+=12;if(text.includes('上午')&&h===12)h=0;d.setHours(h,0,0,0)}else if(text.includes('中午'))d.setHours(12,0,0,0);else if(text.includes('下午')&&!matchedDay)d.setHours(15,0,0,0);else if(text.includes('上午')&&!matchedDay)d.setHours(9,0,0,0)}
  return matchedDay||t24||hm?d.toISOString().slice(0,16):null;
}

function deadlineLabel(d){
  if(!d)return null;const dl=new Date(d),now=new Date(),diff=Math.ceil((dl-now)/86400000),hasTime=d.length>10,isOverdue=dl<now;
  if(isOverdue)return{text:'⏰ 已逾期',cls:'soon overdue'};
  if(diff===0&&hasTime){const hrs=Math.ceil((dl-now)/3600000);return{text:hrs<=0?'即将到期':hrs+'小时后到期',cls:'soon'}}
  if(diff===0)return{text:'今天截止',cls:'soon'};
  if(diff<=3)return{text:diff+'天后到期',cls:'soon'};
  return{text:d.slice(0,10),cls:''};
}

function getFilteredTasks(){let f=[...tasks];if(currentTab==='pending')f=f.filter(t=>t.状态!=='已完成');else if(currentTab==='done')f=f.filter(t=>t.状态==='已完成');if(currentFilter!=='all')f=f.filter(t=>t.品牌===currentFilter);if(searchQuery){const q=searchQuery.toLowerCase();f=f.filter(t=>(t.任务内容||'').toLowerCase().includes(q)||(t.品牌||'').toLowerCase().includes(q)||(t.任务类型||'').toLowerCase().includes(q)||(t.原始消息||'').toLowerCase().includes(q))}f.sort((a,b)=>new Date(b.创建时间)-new Date(a.创建时间));return f}

async function toggleTask(id){const t=tasks.find(t=>t.id===id);if(!t)return;t.状态=t.状态==='已完成'?'未处理':'已完成';if(t.状态==='已完成'){t.完成时间=new Date().toISOString();delete t.last_reminded}else delete t.完成时间;await saveTask(t);refreshAll();showToast(t.状态==='已完成'?'✅ 已完成':'🔄 已恢复')}

// ─── AI Processing ─────────────────────────────
async function processWithAI(text){if(!apiKey){showToast('⚠️ 请先设置 API Key');return null}const prompt=`你是任务结构化助手。从用户消息中提取任务。\n\n## 多任务识别\n消息包含多项独立任务时输出 JSON 数组，单项任务输出单个对象。\n\n## 字段\n- 品牌：运动品牌名，无法识别为空\n- 任务内容：简洁可执行任务描述\n- 任务类型：销售/合同/财务/沟通/其他\n- 来源：员工/自己/领导\n- 优先级：高/中/低\n- 截止时间："YYYY-MM-DDTHH:MM" 或 null\n\n## 时间识别\n- "明天12点前"→明天12:00\n- "下午3点"→当天15:00\n- "下周一"→下周一09:00\n- "3号前"→当月3日18:00\n- 无时间有日期→18:00\n\n当前日期：${new Date().toISOString().slice(0,10)}`;try{const resp=await fetch(DEEPSEEK_API,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},body:JSON.stringify({model:'deepseek-chat',temperature:0.1,max_tokens:800,messages:[{role:'system',content:prompt},{role:'user',content:text}]})});if(!resp.ok){const err=await resp.text();throw new Error('API 错误 ('+resp.status+'): '+err.slice(0,100))}const data=await resp.json(),content=data.choices?.[0]?.message?.content||'',jm=content.match(/(\[[\s\S]*\]|\{[\s\S]*\})/);if(!jm)throw new Error('AI 未返回有效数据');const parsed=JSON.parse(jm[0]),taskList=Array.isArray(parsed)?parsed:[parsed],validTypes=['销售','合同','财务','沟通','其他'],validSources=['员工','自己','领导'],validPrios=['高','中','低'];return taskList.map(t=>{if(!validTypes.includes(t.任务类型))t.任务类型='其他';if(!validSources.includes(t.来源))t.来源='员工';if(!validPrios.includes(t.优先级))t.优先级='中';if(t.截止时间===''||t.截止时间==='null')t.截止时间=null;t.原始消息=text;return t})}catch(err){console.error(err);showToast('❌ '+err.message);return null}}

document.getElementById('notifyEnable').onclick=async()=>{const perm=await Notification.requestPermission();if(perm==='granted'){notificationsEnabled=true;showToast('🔔 通知已开启')}document.getElementById('notifyPrompt').classList.add('hidden')};

function showBrowserNotification(task){if(!notificationsEnabled)return;const title=task.任务内容.slice(0,50),body=[task.品牌?'🏷 '+task.品牌:'',task.截止时间?'⏰ '+task.截止时间.replace('T',' '):''].filter(Boolean).join(' · ');try{new Notification(title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"><rect width="120" height="120" rx="28" fill="%23161b2e"/><text x="60" y="72" text-anchor="middle" fill="%23f0b90b" font-size="52" font-family="sans-serif">📋</text></svg>',tag:task.id+'_'+Math.floor(Date.now()/60000),requireInteraction:true})}catch(_){}}

document.querySelectorAll('.modal-overlay').forEach(ov=>ov.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')}));
const weekdays=['日','一','二','三','四','五','六'],now=new Date();document.getElementById('headerDate').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日 星期'+weekdays[now.getDay()];

async function checkSharedContent(){const params=new URLSearchParams(window.location.search),text=params.get('text');if(text){window.history.replaceState({},'',window.location.pathname);showProcessing(true);const tl=await processWithAI(decodeURIComponent(text));showProcessing(false);if(tl&&tl.length>0){for(const t of tl)await addTask(t);showToast('✅ 已捕获 '+tl.length+' 个任务')}}}

(async function init(){await openDB();await migrateFromLocalStorage();loadApiKey();loadRemindSetting();loadFeishuWebhook();await loadTasks();updateStats();renderTasks();updateFilterBrands();await initNotifications();if(remindInterval||feishuWebhookUrl)startReminderChecker();checkSharedContent();if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{})})();
</script>
